syntax = "proto3";

package catalog.v1;

// option go_package = ".";
option go_package = "github.com/chibx/vuecom/backend/shared/proto/go/catalog";


message Category {
  uint64 id = 1;
  string name = 2;
}

message GetCategoryRequest {
  uint64 id = 1;
}

message GetCategoryResponse {
  Category category = 1;
}
