syntax = "proto3";
package inventory.v1;

// import "google/protobuf/timestamp.proto";

// option go_package = ".";
option go_package = "github.com/chibx/vuecom/backend/shared/proto/go/inventory";

service InventoryService {
  // Add your service methods here
  rpc CreateProductRecord(AddProductRequest) returns (AddProductResponse);
  rpc HasAnyWarehouse(WarehouseExistReq) returns (WarehouseExistResp);
  rpc ListWarehouses(ListWarehousesReq) returns (ListWarehousesResp);
  rpc CreateWarehouse(CreateWarehouseReq) returns (CreateWarehouseResp);
  rpc DeleteWarehouse(DeleteWarehouseReq) returns (DeleteWarehouseResp);
  rpc CreateStockMovement(CreateStockMovementReq) returns (CreateStockMovementResp);
  rpc ListStockMovements(ListStockMovementsReq) returns (ListStockMovementsResp);
}

message WarehouseInfo {
    uint32 id = 1;
    uint32 quantity = 2;
}

message AddProductRequest {
    uint32 product_id = 1;
    repeated WarehouseInfo warehouse_info = 2;
    string sku = 3;
}

message AddProductResponse {}

message WarehouseExistReq {}

message WarehouseExistResp {
  bool exists = 1;
}

message ListWarehousesReq {}

message ListWarehousesResp {
  repeated Warehouse warehouses = 1;
}

message Warehouse {
  uint32 id = 1;
  string code = 2;
  string name = 3;
  string address = 4;
  string city = 5;
  uint32 state_id = 6;
  uint32 country_id = 7;
  bool is_active = 8;
  string created_at = 9;
  string updated_at = 10;
}

message CreateWarehouseReq {
  string code = 1;
  string name = 2;
  string address = 3;
  string city = 4;
  uint32 state_id = 5;
  uint32 country_id = 6;
  bool is_active = 7;
}

message CreateWarehouseResp {
  uint32 id = 1;
}

message DeleteWarehouseReq {
  repeated uint32 warehouse_ids = 1;
}

message DeleteWarehouseResp {}

message CreateStockMovementReq {
  uint32 inventory_id = 1;
  string sku = 2;
  uint32 warehouse_id = 3;
  string movement_type = 4;
  int32 quantity = 5;
  string reference = 6;
  string notes = 7;
  uint32 created_by = 8;
}

message CreateStockMovementResp {
  uint32 id = 1;
}

message ListStockMovementsReq {
  uint32 warehouse_id = 1;
  string sku = 2;
}

message ListStockMovementsResp {
  repeated StockMovement stock_movements = 1;
}

message StockMovement {
  uint32 id = 1;
  uint32 inventory_id = 2;
  string sku = 3;
  uint32 warehouse_id = 4;
  string movement_type = 5;
  int32 quantity = 6;
  string reference = 7;
  string notes = 8;
  uint32 created_by = 9;
  string created_at = 10;
}