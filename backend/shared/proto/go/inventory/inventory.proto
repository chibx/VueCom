syntax = "proto3";
package inventory.v1;

// import "google/protobuf/timestamp.proto";

// option go_package = ".";
option go_package = "github.com/chibx/vuecom/backend/shared/proto/go/inventory";

service InventoryService {
  // Add your service methods here
  rpc CreateProductRecord(AddProductRequest) returns (AddProductResponse);
  rpc HasAnyWarehouse(WarehouseExistReq) returns (WarehouseExistResp);
  rpc ListWarehouses(ListWarehousesReq) returns (ListWarehousesResp);
}

message WarehouseInfo {
    uint32 id = 1;
    uint32 quantity = 2;
}

message AddProductRequest {
    uint32 product_id = 1;
    repeated WarehouseInfo warehouse_info = 2;
    string sku = 3;
}

message AddProductResponse {}

message WarehouseExistReq {}

message WarehouseExistResp {
  bool exists = 1;
}

message ListWarehousesReq {}

message ListWarehousesResp {
  repeated Warehouse warehouses = 1;
}

message Warehouse {
  uint32 id = 1;
  string code = 2;
  string name = 3;
  string address = 4;
  string city = 5;
  uint32 state_id = 6;
  uint32 country_id = 7;
  bool is_active = 8;
  string created_at = 9;
  string updated_at = 10;
}